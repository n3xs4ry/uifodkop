name: Keep Supabase Awake

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase auth health
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/auth/v1/health")

          echo "Supabase health HTTP code: $HTTP_CODE"
          test "$HTTP_CODE" = "200"
        env:
          SUPABASE_URL: "https://mqxbdeqoszefhbonrand.supabase.co"
          SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xeGJkZXFvc3plZmhib25yYW5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3ODk1MDQsImV4cCI6MjA5ODM2NTUwNH0.d1-0UfldNq1eA2NmwfZGSOuVGAalKyEISx7QDQWiuRI"
